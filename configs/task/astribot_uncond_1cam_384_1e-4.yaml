# @package _global_

defaults:
  - override /data: astribot_1cam
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 4
num_workers: 8

model:
  mot_checkpoint_mixed_attn: false
  action_dit_pretrained_path: checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim_astribot18.pt

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null
